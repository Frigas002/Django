<!DOCTYPE html>
<html>
    <head>
        <title>Django Girls blog</title>
    </head>
    <body>
        <header>
            <h1><a href="/">Django Girls Blog</a></h1>
        </header>

        {% for post in posts %}
        <article>
            <time>published: {{ post.publicado }}</time>
            <h2><a href="">{{ post.titulo }}</a></h2>
            <p>{{ post.texto|linebreaksbr }}</p>
        </article>
        {% endfor %}
    </body>
</html>
