{% extends 'blog/base.html' %}
{% block content %}
{% for post in posts %}
        <article class="post">
            <time class="date">{{ post.publicado }}</time>
            <h2><a href="">{{ post.titulo }}</a></h2>
            <p>{{ post.texto|linebreaksbr }}</p>
        </article>
{% endfor %}
{% endblock %}
